services:
  docs:
    image: elyos-docs:latest
    restart: always
    #ports:
    #  - '3001:4321'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.docs.rule=Host(`docs.elyos.hu`)'
      - 'traefik.http.routers.docs.entrypoints=web'
      - 'traefik.http.services.docs.loadbalancer.server.port=80'
    networks:
      - elyos_shared
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  elyos_shared:
    external: true
